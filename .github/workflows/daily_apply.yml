name: Daily Auto-Apply (All Pipelines)

on:
  schedule:
    - cron: '30 0 * * *'  # 6:00 AM IST (00:30 UTC)
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Run specific pipeline (1-7) or "all"'
        required: false
        default: 'all'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        pipeline_id: ['1', '2', '3', '4', '5', '6', '7']
    name: "Pipeline ${{ matrix.pipeline_id }}"

    steps:
      - name: Check if pipeline should run
        id: check
        run: |
          INPUT="${{ github.event.inputs.pipeline }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ] || [ "$INPUT" = "${{ matrix.pipeline_id }}" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'

      - name: Set up Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Install Playwright browser (pipeline 6 only)
        if: steps.check.outputs.skip == 'false' && matrix.pipeline_id == '6'
        run: playwright install --with-deps chromium

      - name: "Run pipeline ${{ matrix.pipeline_id }}"
        if: steps.check.outputs.skip == 'false'
        env:
          YOUR_NAME: ${{ secrets.YOUR_NAME }}
          YOUR_EMAIL: ${{ secrets.YOUR_EMAIL }}
          YOUR_PHONE: ${{ secrets.YOUR_PHONE }}
          YOUR_LOCATION: ${{ secrets.YOUR_LOCATION }}
          YOUR_LINKEDIN: ${{ secrets.YOUR_LINKEDIN }}
          YOUR_GITHUB: ${{ secrets.YOUR_GITHUB }}
          YOUR_PORTFOLIO: ${{ secrets.YOUR_PORTFOLIO }}
          YOUR_EDUCATION: ${{ secrets.YOUR_EDUCATION }}
          YOUR_GRADUATION_YEAR: ${{ secrets.YOUR_GRADUATION_YEAR }}
          COMPANY_1_NAME: ${{ secrets.COMPANY_1_NAME }}
          COMPANY_1_ROLE: ${{ secrets.COMPANY_1_ROLE }}
          COMPANY_1_LOCATION: ${{ secrets.COMPANY_1_LOCATION }}
          COMPANY_1_DURATION: ${{ secrets.COMPANY_1_DURATION }}
          COMPANY_2_NAME: ${{ secrets.COMPANY_2_NAME }}
          COMPANY_2_ROLE: ${{ secrets.COMPANY_2_ROLE }}
          COMPANY_2_LOCATION: ${{ secrets.COMPANY_2_LOCATION }}
          COMPANY_2_DURATION: ${{ secrets.COMPANY_2_DURATION }}
          SMTP_ACCOUNT_1: ${{ secrets.SMTP_ACCOUNT_1 }}
          SMTP_PASSWORD_1: ${{ secrets.SMTP_PASSWORD_1 }}
          SMTP_ACCOUNT_2: ${{ secrets.SMTP_ACCOUNT_2 }}
          SMTP_PASSWORD_2: ${{ secrets.SMTP_PASSWORD_2 }}
          SMTP_ACCOUNT_3: ${{ secrets.SMTP_ACCOUNT_3 }}
          SMTP_PASSWORD_3: ${{ secrets.SMTP_PASSWORD_3 }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GOOGLE_API_KEY_1: ${{ secrets.GOOGLE_API_KEY_1 }}
          GOOGLE_API_KEY_2: ${{ secrets.GOOGLE_API_KEY_2 }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          MODE: 'prod'
          DAILY_EMAIL_CAP: ${{ secrets.DAILY_EMAIL_CAP || '1000' }}
          PER_ACCOUNT_CAP: ${{ secrets.PER_ACCOUNT_CAP || '500' }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
        run: python run.py --pipeline ${{ matrix.pipeline_id }}
